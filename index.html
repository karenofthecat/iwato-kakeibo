<!doctype html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0c"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="iwato家計簿"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json"><link rel="icon" href="./icon.png"><title>iwato家計簿 v0.4</title>
<style>
:root{--bg:#0b0b0c;--card:#17171b;--card2:#24242a;--text:#f6f6f6;--muted:#a1a1aa;--line:#34343b;--green:#98e6aa;--yellow:#f2d36b;--red:#ff8989}*{box-sizing:border-box}body{margin:0;padding:env(safe-area-inset-top) 14px calc(24px + env(safe-area-inset-bottom));background:radial-gradient(circle at top,#242428 0,#0b0b0c 45%,#080809 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}header{display:flex;align-items:center;justify-content:space-between;padding:16px 2px 10px}.brand{display:flex;gap:10px;align-items:center}.appicon{width:48px;height:48px;border-radius:14px;object-fit:cover;background:#fff}h1{font-size:22px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}.badge{font-size:12px;color:#111;background:#f5f5f5;border-radius:999px;padding:7px 10px;font-weight:900}.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;position:sticky;top:0;z-index:10;background:rgba(11,11,12,.94);backdrop-filter:blur(10px);padding:9px 0}.tab{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:12px;padding:10px 0;font-size:11px;font-weight:800}.tab.active{background:#f5f5f5;color:#111}.card{background:rgba(23,23,27,.95);border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 14px 32px rgba(0,0,0,.28)}h2{font-size:16px;margin:0 0 12px}label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px}input,select,textarea{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:13px 12px;font-size:16px;outline:none}textarea{min-height:92px}.row,.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.triple{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}button{width:100%;border:0;border-radius:15px;padding:14px 12px;font-size:15px;font-weight:900;background:#f5f5f5;color:#111;margin-top:10px}button.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)}button.danger{background:#2b1518;color:#ffb6b6;border:1px solid #5a2a30}.mini{padding:8px 10px;font-size:12px;border-radius:11px;margin:0}.metric{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px}.metric .name{font-size:12px;color:var(--muted)}.metric .val{font-size:20px;font-weight:950;margin-top:5px}.safe .val{color:var(--green)}.warn .val{color:var(--yellow)}.danger .val{color:var(--red)}.out{background:#09090a;border:1px dashed #5b5b63;border-radius:15px;padding:12px;white-space:pre-wrap;line-height:1.6;min-height:80px;font-size:14px}.list{display:flex;flex-direction:column;gap:8px;max-height:430px;overflow:auto}.item{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px}.item b{font-size:14px}.item span{font-size:12px;color:var(--muted)}.hidden{display:none}.small{font-size:12px;color:var(--muted);line-height:1.65}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#f5f5f5;color:#111;padding:11px 15px;border-radius:999px;font-weight:900;font-size:13px;opacity:0;transition:.2s;z-index:99}.toast.show{opacity:1;bottom:34px}.progress{height:10px;background:#2b2b31;border-radius:999px;overflow:hidden;margin-top:9px}.bar{height:100%;background:#f5f5f5}.rank{display:flex;align-items:center;gap:10px}.rank .label{width:42%;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank .barwrap{flex:1;background:#2b2b31;border-radius:999px;height:10px;overflow:hidden}.rank .amt{width:82px;text-align:right;font-size:13px;font-weight:900}.mono{font-variant-numeric:tabular-nums}.divider{height:1px;background:var(--line);margin:10px 0}
</style></head><body>
<header><div class="brand"><img class="appicon" src="./icon.png" alt=""><div><h1>iwato家計簿</h1><div class="sub">v0.4 入力は最小限、分析はChatGPT</div></div></div><div class="badge" id="monthBadge">2026/7</div></header>
<nav class="tabs"><button class="tab active" data-view="home">ホーム</button><button class="tab" data-view="input">入力</button><button class="tab" data-view="card">カード</button><button class="tab" data-view="cash">資金</button><button class="tab" data-view="analysis">分析</button><button class="tab" data-view="report">出力</button></nav>
<main id="view-home"><section class="card"><h2>🏠 ホーム</h2><div class="grid" id="homeMetrics"></div></section><section class="card"><h2>安全ライン</h2><div class="metric" id="homeSafety"><div class="name">計算中</div><div class="val">--</div></div></section></main>
<main id="view-input" class="hidden"><section class="card"><h2>＋ 支出入力</h2><div class="row"><div><label>費目</label><select id="cat"></select></div><div><label>支払元</label><select id="method"></select></div></div><label>金額</label><input id="amount" type="number" inputmode="numeric" placeholder="例：8570"><label>メモ</label><input id="memo" placeholder="例：Aillioファン"><div class="row"><div><label>請求月（カード時）</label><input id="billMonth" type="number" inputmode="numeric" placeholder="例：8"></div><div><label>残高反映</label><select id="affectBalance"><option value="yes">反映する</option><option value="no">過去分・反映しない</option></select></div></div><button id="addExpense">追加</button></section><section class="card"><h2>＋ 入金・補充</h2><div class="row"><div><label>入金先</label><select id="incomeTo"></select></div><div><label>金額</label><input id="incomeAmount" type="number" inputmode="numeric" placeholder="例：5000"></div></div><label>内容</label><input id="incomeMemo" placeholder="例：奥さんより"><button id="addIncome">入金する</button></section><section class="card"><h2>↩ 回収・補正</h2><div class="row"><button class="secondary" id="recovery">代理回収</button><button class="secondary" id="balanceFix">残高補正</button></div><div class="row"><button class="secondary" id="waive">代理免除</button><button class="secondary" id="pastMode">過去分メモ</button></div></section><section class="card"><h2>ChatGPTへ貼る文</h2><div class="out" id="copyBox">まだ入力がありません。</div><button id="copy">コピー</button><button class="secondary" id="clearDraft">貼り付け文だけクリア</button></section><section class="card"><h2>最近の入力</h2><div class="list" id="recent"></div></section></main>
<main id="view-card" class="hidden"><section class="card"><h2>💳 カード別合計</h2><div class="row"><div><label>表示請求月</label><input id="cardViewMonth" type="number" inputmode="numeric"></div><div><label>&nbsp;</label><button class="secondary" id="applyCardMonth">表示</button></div></div><div class="grid" id="cardTotals"></div></section><section class="card"><h2>カード明細</h2><div class="list" id="cardDetails"></div></section><section class="card"><h2>➕ 分割・定期支払い</h2><label>名称</label><input id="installName" placeholder="例：Fellowケトル"><div class="row"><div><label>カード</label><select id="installCard"></select></div><div><label>費目</label><select id="installCat"></select></div></div><div class="triple"><div><label>月額</label><input id="installAmount" type="number" inputmode="numeric" placeholder="8142"></div><div><label>開始請求月</label><input id="installStart" type="number" inputmode="numeric" placeholder="7"></div><div><label>終了請求月</label><input id="installEnd" type="number" inputmode="numeric" placeholder="9"></div></div><button id="addInstall">登録</button></section><section class="card"><h2>登録済み分割</h2><div class="list" id="installList"></div></section></main>
<main id="view-cash" class="hidden"><section class="card"><h2>📉 キャッシュフロー</h2><div class="list" id="cashList"></div></section><section class="card"><h2>安全ライン</h2><div class="metric" id="safetyMetric"><div class="name">次の細い地点</div><div class="val">計算中</div></div><p class="small">5万円未満は赤、5〜10万円は黄、10万円以上は緑。</p></section></main>
<main id="view-analysis" class="hidden"><section class="card"><h2>費目別グラフ</h2><div class="list" id="catGraph"></div></section><section class="card"><h2>金額ランキング</h2><div class="list" id="amountRank"></div></section></main>
<main id="view-report" class="hidden"><section class="card"><h2>📄 月次メモ生成</h2><div class="out" id="reportBox"></div><button id="copyReport">月次メモをコピー</button></section><section class="card"><h2>⚙️ 設定・バックアップ</h2><div class="row"><div><label>年</label><input id="year" type="number" inputmode="numeric"></div><div><label>月</label><input id="month" type="number" inputmode="numeric"></div></div><button id="saveYM">年月保存</button><label>データバックアップ</label><textarea id="backup"></textarea><button id="copyBackup">バックアップコピー</button><button class="danger" id="reset">全データ初期化</button></section></main>
<div class="toast" id="toast">コピーしました</div>
<script>
const VERSION='0.4';
const DEFAULT={version:VERSION,year:2026,month:7,cardViewMonth:7,balances:{'口座':191612,'財布':594,'PayPay残高':31642,'ICOCA':1380,'J-Coin':1,'未回収代理':0},categories:['食費・カフェ','住居・日用品','キッチン用品','コーヒー・焙煎設備','医薬品','健康・サプリ','通信費','娯楽','服飾','美容・身だしなみ','交通・駐車場','代理','その他'],methods:['財布','PayPay残高','口座','楽天カード','Amazonカード','PayPayカード','ICOCA','J-Coin','楽天ポイント'],entries:[],draft:[],installments:[{id:'vitamix',name:'Vitamix',card:'Amazonカード',category:'キッチン用品',amount:26436,startBillMonth:7,endBillMonth:8},{id:'fellow',name:'Fellowケトル',card:'楽天カード',category:'コーヒー・焙煎設備',amount:8142,startBillMonth:7,endBillMonth:9},{id:'efg',name:'efg',card:'PayPayカード',category:'服飾',amount:19262,startBillMonth:7,endBillMonth:8}],cashPlan:{'7月':{start:191612,nightIncome:107685,fixed:107570,baseOther:97574,dayIncome:42600},'8月':{start:0,nightIncome:107685,fixed:90570,baseOther:0,dayIncome:80000},'9月':{start:0,nightIncome:107685,fixed:44933,baseOther:0,dayIncome:80000},'10月':{start:0,nightIncome:107685,fixed:39526,baseOther:0,dayIncome:80000},'11月':{start:0,nightIncome:107685,fixed:39526,baseOther:0,dayIncome:80000},'12月':{start:0,nightIncome:107685,fixed:39526,baseOther:0,dayIncome:80000}}};
function clone(x){return JSON.parse(JSON.stringify(x))}function load(){try{let d=JSON.parse(localStorage.getItem('iwato-kakeibo-v01'));return migrate(d||clone(DEFAULT))}catch(e){return clone(DEFAULT)}}function save(){localStorage.setItem('iwato-kakeibo-v01',JSON.stringify(data))}function migrate(d){d.version=VERSION;d.categories=DEFAULT.categories;d.methods=DEFAULT.methods;d.cashPlan=DEFAULT.cashPlan;d.balances=d.balances||clone(DEFAULT.balances);d.entries=d.entries||[];d.draft=d.draft||[];d.cardViewMonth=d.cardViewMonth||d.month||7;d.installments=(d.installments||DEFAULT.installments).map(x=>({id:x.id||x.name||String(Date.now()+Math.random()),name:x.name,card:x.card,category:x.category||x.cat||'その他',amount:+(x.amount||0),startBillMonth:+(x.startBillMonth||x.startMonth||x.start||7),endBillMonth:+(x.endBillMonth||x.endMonth||x.end||7)}));d.entries=d.entries.map(e=>{if(e.type==='支出')e.type='expense';if(e.type==='expense'&&!e.billMonth&&isCard(e.method))e.billMonth=d.month;return e});return d}let data=load();
const cardMethods=['楽天カード','Amazonカード','PayPayカード'];const moneyMethods=['財布','PayPay残高','口座','ICOCA','J-Coin','楽天ポイント'];function yen(n){return Number(n||0).toLocaleString('ja-JP')+'円'}function isCard(m){return cardMethods.includes(m)}function mNum(m){return +String(m).replace('月','')}function q(id){return document.getElementById(id)}function today(){let d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}function toast(s='コピーしました'){let t=q('toast');t.textContent=s;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1300)}async function copy(s){try{await navigator.clipboard.writeText(s);toast()}catch(e){toast('長押しでコピー')}}function sel(id,a){q(id).innerHTML=a.map(x=>`<option>${x}</option>`).join('')}function cls(v){return v<50000?'danger':v<100000?'warn':'safe'}
function entriesForBill(m,card){return data.entries.filter(e=>e.type==='expense'&&isCard(e.method)&&+(e.billMonth||data.month)===+m&&(!card||e.method===card))}function instFor(m,card){return data.installments.filter(x=>+m>=x.startBillMonth&&+m<=x.endBillMonth&&(!card||x.card===card))}function cardTotal(m,card){return entriesForBill(m,card).reduce((a,e)=>a+(+e.amount||0),0)+instFor(m,card).reduce((a,e)=>a+(+e.amount||0),0)}function otherTotal(m){let p=data.cashPlan[m+'月']||{baseOther:0};return +(p.baseOther||0)+cardMethods.reduce((a,c)=>a+cardTotal(m,c),0)}function catSums(){let s={};data.entries.forEach(e=>{if(e.type==='expense'&&e.category!=='代理')s[e.category]=(s[e.category]||0)+(+e.amount||0)});instFor(data.month).forEach(x=>s[x.category]=(s[x.category]||0)+(+x.amount||0));return s}function ranking(){let r=[];data.entries.forEach(e=>{if(e.type==='expense'&&e.category!=='代理')r.push({label:e.memo||e.category,amount:e.amount,sub:e.method})});instFor(data.month).forEach(x=>r.push({label:x.name,amount:x.amount,sub:x.card+' 分割'}));return r.sort((a,b)=>b.amount-a.amount)}function cashFlow(){let rows=[],prev=null;Object.entries(data.cashPlan).forEach(([mn,p])=>{let m=mNum(mn),start=prev??+(p.start||0),afterNight=start+(+p.nightIncome||0),other=otherTotal(m),totalPay=(+p.fixed||0)+other,afterPay=afterNight-totalPay,afterDay=afterPay+(+p.dayIncome||0);rows.push({month:mn,start,afterNight,fixed:p.fixed,other,totalPay,afterPay,afterDay});prev=afterDay});return rows}function safety(){let rows=cashFlow(),min=rows[0];rows.forEach(r=>{if(r.afterPay<min.afterPay)min=r});return {label:min.month+' 支払い後',amount:min.afterPay}}
function render(){q('monthBadge').textContent=`${data.year}/${data.month}`;sel('cat',data.categories);sel('method',data.methods);sel('incomeTo',data.methods.filter(x=>moneyMethods.includes(x)));sel('installCard',cardMethods);sel('installCat',data.categories.filter(c=>c!=='代理'));renderHome();renderInput();renderCards();renderCash();renderAnalysis();renderReport();save()}
function renderHome(){let s=catSums(),food=s['食費・カフェ']||0,ct=cardMethods.reduce((a,c)=>a+cardTotal(data.month,c),0),sf=safety();q('homeMetrics').innerHTML=`<div class="metric"><div class="name">財布</div><div class="val">${yen(data.balances['財布'])}</div></div><div class="metric"><div class="name">PayPay残高</div><div class="val">${yen(data.balances['PayPay残高'])}</div></div><div class="metric"><div class="name">口座</div><div class="val">${yen(data.balances['口座'])}</div></div><div class="metric"><div class="name">${data.month}月カード請求</div><div class="val">${yen(ct)}</div></div><div class="metric"><div class="name">食費・カフェ</div><div class="val">${yen(food)}</div><div class="progress"><div class="bar" style="width:${Math.min(100,Math.round(food/30000*100))}%"></div></div></div><div class="metric"><div class="name">未回収代理</div><div class="val">${yen(data.balances['未回収代理'])}</div></div>`;let el=q('homeSafety');el.className='metric '+cls(sf.amount);el.innerHTML=`<div class="name">${sf.label}</div><div class="val">${yen(sf.amount)}</div>`}
function renderInput(){q('copyBox').textContent=data.draft.length?['【支出】',...data.draft].join('\n'):'まだ入力がありません。';q('recent').innerHTML=data.entries.length?[...data.entries].slice(-20).reverse().map(e=>`<div class="item"><div><b>${e.label}</b><br><span>${e.date}</span></div><button class="mini secondary" onclick="delEntry('${e.id}')">削除</button></div>`).join(''):'<p class="small">まだ履歴がありません。</p>'}
function renderCards(){q('cardViewMonth').value=data.cardViewMonth;q('cardTotals').innerHTML=cardMethods.map(c=>`<div class="metric"><div class="name">${c}</div><div class="val">${yen(cardTotal(data.cardViewMonth,c))}</div></div>`).join('');let h='';cardMethods.forEach(c=>{h+=`<div class="metric"><div class="name">${c}</div><div class="val">${yen(cardTotal(data.cardViewMonth,c))}</div></div><div class="list">`;entriesForBill(data.cardViewMonth,c).forEach(e=>h+=`<div class="item"><div><b>${e.memo||e.category} ${yen(e.amount)}</b><br><span>${e.category} / 購入 ${e.date} / 請求 ${e.billMonth}月</span></div></div>`);instFor(data.cardViewMonth,c).forEach(x=>h+=`<div class="item"><div><b>${x.name} ${yen(x.amount)}</b><br><span>${x.category} / 分割 ${x.startBillMonth}月〜${x.endBillMonth}月</span></div><button class="mini secondary" onclick="delInstall('${x.id}')">削除</button></div>`);h+='</div><div class="divider"></div>'});q('cardDetails').innerHTML=h;q('installList').innerHTML=data.installments.length?data.installments.map(x=>`<div class="item"><div><b>${x.name} ${yen(x.amount)}</b><br><span>${x.card} / ${x.category} / ${x.startBillMonth}月〜${x.endBillMonth}月</span></div><button class="mini secondary" onclick="delInstall('${x.id}')">削除</button></div>`).join(''):'<p class="small">登録なし</p>'}
function renderCash(){q('cashList').innerHTML=cashFlow().map(r=>`<div class="item"><div><b>${r.month}</b><br><span class="mono">月初 ${yen(r.start)} / 夜職後 ${yen(r.afterNight)}<br>固定 ${yen(r.fixed)} / 固定以外 ${yen(r.other)}<br>支払い後 ${yen(r.afterPay)} / 昼職後 ${yen(r.afterDay)}</span></div></div>`).join('');let sf=safety(),el=q('safetyMetric');el.className='metric '+cls(sf.amount);el.innerHTML=`<div class="name">${sf.label}</div><div class="val">${yen(sf.amount)}</div>`}
function renderAnalysis(){let rows=Object.entries(catSums()).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]),max=rows[0]?.[1]||1;q('catGraph').innerHTML=rows.length?rows.map(([k,v])=>`<div class="rank"><div class="label">${k}</div><div class="barwrap"><div class="bar" style="width:${Math.round(v/max*100)}%"></div></div><div class="amt">${yen(v)}</div></div>`).join(''):'<p class="small">データなし</p>';let rank=ranking();q('amountRank').innerHTML=rank.length?rank.slice(0,20).map(r=>`<div class="item"><div><b>${r.label} ${yen(r.amount)}</b><br><span>${r.sub}</span></div></div>`).join(''):'<p class="small">データなし</p>'}
function renderReport(){let s=catSums(),total=Object.values(s).reduce((a,b)=>a+b,0),bal=Object.entries(data.balances).map(([k,v])=>`| ${k} | ${yen(v)} |`).join('\n'),cats=data.categories.filter(c=>c!=='代理').map(c=>`| ${c} | ${yen(s[c]||0)} |`).join('\n'),cards=cardMethods.map(c=>`| ${c} | ${yen(cardTotal(data.month,c))} |`).join('\n');q('reportBox').textContent=`# 家計簿 ${data.year}年${data.month}月 メモ\n\n## 現在残高\n\n| 種別 | 金額 |\n|---|---:|\n${bal}\n\n## 費目別支出（端末入力分＋分割）\n\n| 費目 | 金額 |\n|---|---:|\n${cats}\n| 合計 | ${yen(total)} |\n\n## カード請求見込み\n\n| カード | 金額 |\n|---|---:|\n${cards}\n\n※正式な月次締めはChatGPT記録とCSV照合を優先。`;q('year').value=data.year;q('month').value=data.month;q('backup').value=JSON.stringify(data,null,2)}
function addEntry(e){e.id=String(Date.now()+Math.random());e.date=today();data.entries.push(e)}function addExpense(){let category=q('cat').value,method=q('method').value,amount=+q('amount').value,memo=q('memo').value.trim(),affect=q('affectBalance').value==='yes',billMonth=+(q('billMonth').value||data.month);if(!amount){toast('金額を入力');return}let label=`${category} ${amount} ${method}${memo?' '+memo:''}${isCard(method)?' 請求'+billMonth+'月':''}${!affect?' 過去分':''}`;data.draft.push(label);addEntry({type:'expense',category,method,amount,memo,label,billMonth,affectBalance:affect});if(affect&&moneyMethods.includes(method))data.balances[method]-=amount;if(category==='代理')data.balances['未回収代理']+=amount;q('amount').value='';q('memo').value='';q('billMonth').value='';render()}function addIncome(){let method=q('incomeTo').value,amount=+q('incomeAmount').value,memo=q('incomeMemo').value.trim();if(!amount){toast('金額を入力');return}let label=`入金 ${amount} ${method}${memo?' '+memo:''}`;data.draft.push(label);addEntry({type:'income',method,amount,memo,label});if(data.balances[method]!==undefined)data.balances[method]+=amount;q('incomeAmount').value='';q('incomeMemo').value='';render()}function recovery(){let amount=+prompt('回収額','');if(!amount)return;let method=prompt('入金先','財布')||'財布',label=`代理 ${amount} 回収 ${method}`;data.draft.push(label);addEntry({type:'recovery',amount,method,label});if(data.balances[method]!==undefined)data.balances[method]+=amount;data.balances['未回収代理']=Math.max(0,data.balances['未回収代理']-amount);render()}function balanceFix(){let method=prompt('補正項目','PayPay残高')||'PayPay残高',amount=+prompt('実残高','');if(amount!==0&&!amount)return;let label=`【残高】\n${method} ${amount}`;data.draft.push(label);addEntry({type:'balance',amount,method,label});if(data.balances[method]!==undefined)data.balances[method]=amount;render()}function waive(){let amount=+prompt('免除額','');if(!amount)return;let label=`代理 ${amount} 免除`;data.draft.push(label);addEntry({type:'waive',amount,label});data.balances['未回収代理']=Math.max(0,data.balances['未回収代理']-amount);render()}function addInstall(){let name=q('installName').value.trim(),card=q('installCard').value,category=q('installCat').value,amount=+q('installAmount').value,startBillMonth=+q('installStart').value,endBillMonth=+q('installEnd').value;if(!name||!amount||!startBillMonth||!endBillMonth){toast('分割情報を入力');return}data.installments.push({id:String(Date.now()+Math.random()),name,card,category,amount,startBillMonth,endBillMonth});data.draft.push(`分割登録 ${name} ${amount} ${card} ${startBillMonth}月〜${endBillMonth}月`);['installName','installAmount','installStart','installEnd'].forEach(id=>q(id).value='');render()}window.delEntry=id=>{data.entries=data.entries.filter(e=>e.id!==id);toast('削除しました。残高は必要なら補正してください');render()};window.delInstall=id=>{data.installments=data.installments.filter(x=>x.id!==id);toast('分割を削除しました');render()};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');['home','input','card','cash','analysis','report'].forEach(v=>q('view-'+v).classList.add('hidden'));q('view-'+b.dataset.view).classList.remove('hidden');render()});q('addExpense').onclick=addExpense;q('addIncome').onclick=addIncome;q('recovery').onclick=recovery;q('balanceFix').onclick=balanceFix;q('waive').onclick=waive;q('pastMode').onclick=()=>{q('affectBalance').value='no';toast('残高反映なしにしました')};q('addInstall').onclick=addInstall;q('applyCardMonth').onclick=()=>{data.cardViewMonth=+q('cardViewMonth').value||data.month;render()};q('copy').onclick=()=>copy(q('copyBox').textContent);q('clearDraft').onclick=()=>{data.draft=[];render()};q('copyReport').onclick=()=>copy(q('reportBox').textContent);q('saveYM').onclick=()=>{data.year=+q('year').value||data.year;data.month=+q('month').value||data.month;data.cardViewMonth=data.month;render()};q('copyBackup').onclick=()=>copy(q('backup').value);q('reset').onclick=()=>{if(confirm('全データを初期化しますか？')){localStorage.removeItem('iwato-kakeibo-v01');data=clone(DEFAULT);render()}};
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}render();
</script></body></html>
