<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f0f10"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="iwato家計簿"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="manifest" href="./manifest.json"><link rel="icon" href="./icon.svg"><title>iwato家計簿 v0.3</title><style>

ng:8px 10px;font-size:12px;border-radius:11px;margin:0}.metric{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px}.metric .name{font-size:12px;color:var(--muted)}.metric .val{font-size:20px;font-weight:950;margin-top:5px}.safe .val{color:var(--green)}.warn .val{color:var(--yellow)}.danger .val{color:var(--red)}.out{background:#09090a;border:1px dashed #5b5b63;border-radius:15px;padding:12px;white-space:pre-wrap;line-height:1.6;min-height:80px;font-size:14px}.list{display:flex;flex-direction:column;gap:8px;max-height:430px;overflow:auto}.item{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px}.item b{font-size:14px}.item span{font-size:12px;color:var(--muted)}.hidden{display:none}.small{font-size:12px;color:var(--muted);line-height:1.65}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#f5f5f5;color:#111;padding:11px 15px;border-radius:999px;font-weight:900;font-size:13px;opacity:0;transition:.2s;z-index:99}.toast.show{opacity:1;bottom:34px}.progress{height:10px;background:#2b2b31;border-radius:999px;overflow:hidden;margin-top:9px}.bar{height:100%;background:#f5f5f5;width:0%}.rank{display:flex;align-items:center;gap:10px}.rank .label{width:42%;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank .barwrap{flex:1;background:#2b2b31;border-radius:999px;height:10px;overflow:hidden}.rank .amt{width:82px;text-align:right;font-size:13px;font-weight:900}.divider{height:1px;background:var(--line);margin:10px 0}.mono{font-variant-numeric:tabular-nums}
</style></head><body><header><div><h1>☕ iwato家計簿</h1><div class="sub">入力は最小限、分析はChatGPT</div></div><div class="badge" id="monthBadge">2026/7</div></header><nav class="tabs"><button class="tab active" data-view="home">ホーム</button><button class="tab" data-view="input">入力</button><button class="tab" data-view="card">カード</button><button class="tab" data-view="cash">資金</button><button class="tab" data-view="report">出力</button></nav>
<main id="view-home"><section class="card"><h2>🏠 ホーム</h2><div class="grid" id="homeMetrics"></div></section><section class="card"><h2>安全ライン</h2><div class="metric" id="homeSafety"><div class="name">計算中</div><div class="val">--</div></div></section><section class="card"><h2>費目別グラフ</h2><div class="list" id="catGraph"></div></section></main>
<main id="view-input" class="hidden"><section class="card"><h2>＋ 支出入力</h2><div class="row"><div><label>費目</label><select id="cat"></select></div><div><label>支払元</label><select id="method"></select></div></div><label>金額</label><input id="amount" type="number" inputmode="numeric" placeholder="例：8570"><label>メモ</label><input id="memo" placeholder="例：Aillioファン"><button id="add">追加して残高反映</button></section><section class="card"><h2>↩ 回収・補正</h2><div class="row"><button class="secondary" id="recovery">代理回収</button><button class="secondary" id="balanceFix">残高補正</button></div><div class="row"><button class="secondary" id="transfer">家計内移動</button><button class="secondary" id="waive">代理免除</button></div></section><section class="card"><h2>ChatGPTへ貼る文</h2><div class="out" id="copyBox">まだ入力がありません。</div><button id="copy">コピー</button><button class="secondary" id="clearDraft">貼り付け文だけクリア</button></section><section class="card"><h2>最近の入力</h2><div class="list" id="recent"></div></section></main>
<main id="view-card" class="hidden"><section class="card"><h2>💳 カード別合計</h2><div class="grid" id="cardTotals"></div></section><section class="card"><h2>カード明細</h2><div class="list" id="cardDetails"></div></section><section class="card"><h2>➕ 分割払い登録</h2><label>名称</label><input id="installName" placeholder="例：Fellowケトル"><div class="row"><div><label>カード</label><select id="installCard"></select></div><div><label>費目</label><select id="installCat"></select></div></div><div class="triple"><div><label>月額</label><input id="installAmount" type="number" inputmode="numeric" placeholder="8142"></div><div><label>開始月</label><input id="installStart" type="number" inputmode="numeric" placeholder="7"></div><div><label>終了月</label><input id="installEnd" type="number" inputmode="numeric" placeholder="9"></div></div><button id="addInstall">分割払いを登録</button></section><section class="card"><h2>登録済み分割</h2><div class="list" id="installList"></div></section></main>
<main id="view-cash" class="hidden"><section class="card"><h2>📉 キャッシュフロー</h2><div class="list" id="cashList"></div></section><section class="card"><h2>安全ライン</h2><div class="metric" id="safetyMetric"><div class="name">次の細い地点</div><div class="val">計算中</div></div><p class="small">5万円未満は赤、5〜10万円は黄、10万円以上は緑。</p></section></main>
<main id="view-report" class="hidden"><section class="card"><h2>📄 月次メモ生成</h2><div class="out" id="reportBox"></div><button id="copyReport">月次メモをコピー</button></section><section class="card"><h2>⚙️ 設定・バックアップ</h2><div class="row"><div><label>年</label><input id="year" type="number" inputmode="numeric"></div><div><label>月</label><input id="month" type="number" inputmode="numeric"></div></div><button id="saveYM">年月保存</button><label>データバックアップ</label><textarea id="backup"></textarea><button id="copyBackup">バックアップコピー</button><button class="danger" id="reset">全データ初期化</button></section></main><div class="toast" id="toast">コピーしました</div>
<script>
const APP_VERSION="0.3";const DEFAULT_DATA={version:APP_VERSION,year:2026,month:7,balances:{"口座":191612,"財布":874,"PayPay残高":32447,"ICOCA":1380,"J-Coin":1,"未回収代理":0},categories:["食費・カフェ","住居・日用品","キッチン用品","コーヒー・焙煎設備","医薬品","健康・サプリ","通信費","娯楽","服飾","美容・身だしなみ","代理","その他"],methods:["財布","PayPay残高","口座","楽天カード","Amazonカード","PayPayカード","ICOCA","J-Coin","楽天ポイント"],entries:[],installments:[{id:"vitamix",name:"Vitamix",card:"Amazonカード",category:"キッチン用品",amount:26436,startMonth:7,endMonth:8},{id:"fellow",name:"Fellowケトル",card:"楽天カード",category:"コーヒー・焙煎設備",amount:8142,startMonth:7,endMonth:9},{id:"efg",name:"efg",card:"PayPayカード",category:"服飾",amount:19262,startMonth:7,endMonth:8}],draft:[],cashPlan:{"7月":{start:191612,nightIncome:107685,fixed:107570,baseOther:97574,dayIncome:42600},"8月":{start:0,nightIncome:107685,fixed:90570,baseOther:0,dayIncome:80000},"9月":{start:0,nightIncome:107685,fixed:44933,baseOther:0,dayIncome:80000},"10月":{start:0,nightIncome:107685,fixed:39526,baseOther:0,dayIncome:80000},"11月":{start:0,nightIncome:107685,fixed:39526,baseOther:0,dayIncome:80000},"12月":{start:0,nightIncome:107685,fixed:39526,baseOther:0,dayIncome:80000}}};
const Store={load(){try{const raw=localStorage.getItem("iwato-kakeibo-v01");if(!raw)return structuredClone(DEFAULT_DATA);return this.migrate(JSON.parse(raw))}catch(e){return structuredClone(DEFAULT_DATA)}},save(d){localStorage.setItem("iwato-kakeibo-v01",JSON.stringify(d))},migrate(d){const n=structuredClone(DEFAULT_DATA);d.version=APP_VERSION;d.categories=n.categories;d.methods=n.methods;d.balances=d.balances||n.balances;d.entries=d.entries||[];d.draft=d.draft||[];d.installments=(d.installments||n.installments).map(x=>({id:x.id||x.name||String(Date.now()+Math.random()),name:x.name,card:x.card,category:x.category||x.cat||"その他",amount:Number(x.amount||0),startMonth:Number(x.startMonth||x.start||7),endMonth:Number(x.endMonth||x.end||7)}));d.cashPlan=n.cashPlan;return d}};let data=Store.load();
const Calc={cardMethods:["楽天カード","Amazonカード","PayPayカード"],moneyMethods:["財布","PayPay残高","口座","ICOCA","J-Coin","楽天ポイント"],yen(n){return Number(n||0).toLocaleString("ja-JP")+"円"},monthName(){return data.month+"月"},monthNum(m){return Number(String(m).replace("月",""))},isCard(m){return this.cardMethods.includes(m)},entriesForBillMonth(m,card=null){const mo=this.monthNum(m);return data.entries.filter(e=>e.type==="expense"&&this.isCard(e.method)&&Number(e.billMonth||data.month)===mo&&(!card||e.method===card))},installmentsForMonth(m,card=null){const mo=this.monthNum(m);return data.installments.filter(x=>mo>=x.startMonth&&mo<=x.endMonth&&(!card||x.card===card))},cardTotal(m,card){return this.entriesForBillMonth(m,card).reduce((a,e)=>a+Number(e.amount||0),0)+this.installmentsForMonth(m,card).reduce((a,e)=>a+Number(e.amount||0),0)},otherTotal(m){const p=data.cashPlan[m]||{baseOther:0};return Number(p.baseOther||0)+this.cardMethods.reduce((a,c)=>a+this.cardTotal(m,c),0)},categorySums(){const s={};for(const e of data.entries){if(e.type==="expense"&&e.category!=="代理")s[e.category]=(s[e.category]||0)+Number(e.amount||0)}for(const x of this.installmentsForMonth(this.monthName()))s[x.category]=(s[x.category]||0)+Number(x.amount||0);return s},cashFlow(){const rows=[];let prevEnd=null;for(const [m,p] of Object.entries(data.cashPlan)){const start=prevEnd??Number(p.start||0),afterNight=start+Number(p.nightIncome||0),other=this.otherTotal(m),totalPay=Number(p.fixed||0)+other,afterPay=afterNight-totalPay,afterDay=afterPay+Number(p.dayIncome||0);rows.push({month:m,start,afterNight,fixed:p.fixed,other,totalPay,afterPay,afterDay});prevEnd=afterDay}return rows},safety(){let rows=this.cashFlow(),min=rows[0];for(const r of rows){if(r.afterPay<min.afterPay)min=r}return{label:min.month+" 支払い後",amount:min.afterPay}}};
const UI={qs(id){return document.getElementById(id)},toast(s="コピーしました"){const t=this.qs("toast");t.textContent=s;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1300)},async copy(s){try{await navigator.clipboard.writeText(s);this.toast()}catch(e){this.toast("コピーできない場合は長押しで選択")}},fillSelect(id,arr){this.qs(id).innerHTML=arr.map(x=>`<option>${x}</option>`).join("")},classByAmount(v){return v<50000?"danger":v<100000?"warn":"safe"},render(){this.qs("monthBadge").textContent=`${data.year}/${data.month}`;this.fillSelect("cat",data.categories);this.fillSelect("method",data.methods);this.fillSelect("installCard",Calc.cardMethods);this.fillSelect("installCat",data.categories.filter(c=>c!=="代理"));this.renderHome();this.renderInput();this.renderCards();this.renderCash();this.renderReport();Store.save(data)},renderHome(){const sums=Calc.categorySums(),food=sums["食費・カフェ"]||0,cardTotal=Calc.cardMethods.reduce((a,c)=>a+Calc.cardTotal(Calc.monthName(),c),0),safety=Calc.safety();this.qs("homeMetrics").innerHTML=`<div class="metric"><div class="name">財布</div><div class="val">${Calc.yen(data.balances["財布"])}</div></div><div class="metric"><div class="name">PayPay残高</div><div class="val">${Calc.yen(data.balances["PayPay残高"])}</div></div><div class="metric"><div class="name">口座</div><div class="val">${Calc.yen(data.balances["口座"])}</div></div><div class="metric"><div class="name">カード請求見込み</div><div class="val">${Calc.yen(cardTotal)}</div></div><div class="metric"><div class="name">食費・カフェ</div><div class="val">${Calc.yen(food)}</div><div class="progress"><div class="bar" style="width:${Math.min(100,Math.round(food/30000*100))}%"></div></div></div><div class="metric"><div class="name">未回収代理</div><div class="val">${Calc.yen(data.balances["未回収代理"])}</div></div>`;const el=this.qs("homeSafety");el.className="metric "+this.classByAmount(safety.amount);el.innerHTML=`<div class="name">${safety.label}</div><div class="val">${Calc.yen(safety.amount)}</div>`;this.renderCatGraph()},renderCatGraph(){const rows=Object.entries(Calc.categorySums()).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]),max=rows[0]?.[1]||1;this.qs("catGraph").innerHTML=rows.length?rows.map(([k,v])=>`<div class="rank"><div class="label">${k}</div><div class="barwrap"><div class="bar" style="width:${Math.round(v/max*100)}%"></div></div><div class="amt">${Calc.yen(v)}</div></div>`).join(""):`<p class="small">まだ費目データがありません。</p>`},renderInput(){this.qs("copyBox").textContent=data.draft.length?["【支出】",...data.draft].join("\n"):"まだ入力がありません。";this.qs("recent").innerHTML=data.entries.length?[...data.entries].slice(-20).reverse().map(e=>`<div class="item"><div><b>${e.label}</b><br><span>${e.date}</span></div><button class="mini secondary" onclick="Actions.deleteEntry('${e.id}')">削除</button></div>`).join(""):`<p class="small">まだ履歴がありません。</p>`},renderCards(){const m=Calc.monthName();this.qs("cardTotals").innerHTML=Calc.cardMethods.map(c=>`<div class="metric"><div class="name">${c}</div><div class="val">${Calc.yen(Calc.cardTotal(m,c))}</div></div>`).join("");let html="";for(const c of Calc.cardMethods){html+=`<div class="metric"><div class="name">${c}</div><div class="val">${Calc.yen(Calc.cardTotal(m,c))}</div></div><div class="list">`;for(const e of Calc.entriesForBillMonth(m,c))html+=`<div class="item"><div><b>${e.memo||e.category} ${Calc.yen(e.amount)}</b><br><span>${e.category} / ${e.date}</span></div></div>`;for(const x of Calc.installmentsForMonth(m,c))html+=`<div class="item"><div><b>${x.name} ${Calc.yen(x.amount)}</b><br><span>${x.category} / 分割 ${x.startMonth}月〜${x.endMonth}月</span></div><button class="mini secondary" onclick="Actions.deleteInstallment('${x.id}')">削除</button></div>`;html+=`</div><div class="divider"></div>`}this.qs("cardDetails").innerHTML=html;this.qs("installList").innerHTML=data.installments.length?data.installments.map(x=>`<div class="item"><div><b>${x.name} ${Calc.yen(x.amount)}</b><br><span>${x.card} / ${x.category} / ${x.startMonth}月〜${x.endMonth}月</span></div><button class="mini secondary" onclick="Actions.deleteInstallment('${x.id}')">削除</button></div>`).join(""):`<p class="small">登録済み分割はありません。</p>`},renderCash(){const rows=Calc.cashFlow();this.qs("cashList").innerHTML=rows.map(r=>`<div class="item"><div><b>${r.month}</b><br><span class="mono">月初 ${Calc.yen(r.start)} / 夜職後 ${Calc.yen(r.afterNight)}<br>固定 ${Calc.yen(r.fixed)} / 固定以外 ${Calc.yen(r.other)}<br>支払い後 ${Calc.yen(r.afterPay)} / 昼職後 ${Calc.yen(r.afterDay)}</span></div></div>`).join("");const s=Calc.safety(),el=this.qs("safetyMetric");el.className="metric "+this.classByAmount(s.amount);el.innerHTML=`<div class="name">${s.label}</div><div class="val">${Calc.yen(s.amount)}</div>`},renderReport(){const sums=Calc.categorySums(),total=Object.values(sums).reduce((a,b)=>a+b,0),bal=Object.entries(data.balances).map(([k,v])=>`| ${k} | ${Calc.yen(v)} |`).join("\n"),cats=data.categories.filter(c=>c!=="代理").map(c=>`| ${c} | ${Calc.yen(sums[c]||0)} |`).join("\n"),cards=Calc.cardMethods.map(c=>`| ${c} | ${Calc.yen(Calc.cardTotal(Calc.monthName(),c))} |`).join("\n");this.qs("reportBox").textContent=`# 家計簿 ${data.year}年${data.month}月 メモ\n\n## 現在残高\n\n| 種別 | 金額 |\n|---|---:|\n${bal}\n\n## 費目別支出（端末入力分＋分割）\n\n| 費目 | 金額 |\n|---|---:|\n${cats}\n| 合計 | ${Calc.yen(total)} |\n\n## カード請求見込み\n\n| カード | 金額 |\n|---|---:|\n${cards}\n\n※正式な月次締めはChatGPT記録とCSV照合を優先。`;this.qs("year").value=data.year;this.qs("month").value=data.month;this.qs("backup").value=JSON.stringify(data,null,2)}};
const Actions={today(){const d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`},addEntry(e){e.id=String(Date.now()+Math.random());e.date=this.today();data.entries.push(e)},expense(){const category=UI.qs("cat").value,method=UI.qs("method").value,amount=Number(UI.qs("amount").value),memo=UI.qs("memo").value.trim();if(!amount){UI.toast("金額を入力");return}const label=`${category} ${amount} ${method}${memo?" "+memo:""}`;data.draft.push(label);this.addEntry({type:"expense",category,method,amount,memo,label,billMonth:data.month});if(Calc.moneyMethods.includes(method))data.balances[method]-=amount;if(category==="代理")data.balances["未回収代理"]+=amount;UI.qs("amount").value="";UI.qs("memo").value="";UI.render()},recovery(){const amount=Number(prompt("回収額",""));if(!amount)return;const method=prompt("入金先","財布")||"財布",label=`代理 ${amount} 回収 ${method}`;data.draft.push(label);this.addEntry({type:"recovery",amount,method,label});if(data.balances[method]!==undefined)data.balances[method]+=amount;data.balances["未回収代理"]=Math.max(0,data.balances["未回収代理"]-amount);UI.render()},balanceFix(){const method=prompt("補正項目","PayPay残高")||"PayPay残高",amount=Number(prompt("実残高",""));if(amount!==0&&!amount)return;const label=`【残高】\n${method} ${amount}`;data.draft.push(label);this.addEntry({type:"balance",amount,method,label});if(data.balances[method]!==undefined)data.balances[method]=amount;UI.render()},transfer(){const amount=Number(prompt("移動額",""));if(!amount)return;const method=prompt("増える項目","PayPay残高")||"PayPay残高",label=`家計内移動 ${amount} ${method}`;data.draft.push(label);this.addEntry({type:"transfer",amount,method,label});if(data.balances[method]!==undefined)data.balances[method]+=amount;UI.render()},waive(){const amount=Number(prompt("免除額",""));if(!amount)return;const label=`代理 ${amount} 免除`;data.draft.push(label);this.addEntry({type:"waive",amount,label});data.balances["未回収代理"]=Math.max(0,data.balances["未回収代理"]-amount);UI.render()},addInstallment(){const name=UI.qs("installName").value.trim(),card=UI.qs("installCard").value,category=UI.qs("installCat").value,amount=Number(UI.qs("installAmount").value),startMonth=Number(UI.qs("installStart").value),endMonth=Number(UI.qs("installEnd").value);if(!name||!amount||!startMonth||!endMonth){UI.toast("分割情報を入力");return}data.installments.push({id:String(Date.now()+Math.random()),name,card,category,amount,startMonth,endMonth});data.draft.push(`分割登録 ${name} ${amount} ${card} ${startMonth}月〜${endMonth}月`);["installName","installAmount","installStart","installEnd"].forEach(id=>UI.qs(id).value="");UI.render()},deleteEntry(id){data.entries=data.entries.filter(e=>e.id!==id);UI.toast("削除しました。残高は必要なら補正してください");UI.render()},deleteInstallment(id){data.installments=data.installments.filter(x=>x.id!==id);UI.toast("分割を削除しました");UI.render()}};
