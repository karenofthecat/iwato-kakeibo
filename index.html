<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f0f10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="iwato家計簿">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg">
<title>iwato家計簿</title>
<style>
:root{--bg:#0c0c0d;--card:#18181b;--card2:#222226;--text:#f5f5f5;--muted:#a1a1aa;--line:#33333a;--green:#9de8ad;--yellow:#f4d56c;--red:#ff8a8a}
*{box-sizing:border-box} body{margin:0;padding:env(safe-area-inset-top) 14px calc(24px + env(safe-area-inset-bottom));background:radial-gradient(circle at top,#202024 0,#0c0c0d 42%,#09090a 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
header{padding:16px 2px 10px;display:flex;justify-content:space-between;align-items:center} h1{font-size:23px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}.badge{font-size:12px;color:#111;background:#f5f5f5;border-radius:999px;padding:7px 10px;font-weight:800}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;position:sticky;top:0;z-index:10;background:rgba(12,12,13,.92);backdrop-filter:blur(10px);padding:9px 0}.tab{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:14px;padding:10px 4px;font-size:13px;font-weight:700}.tab.active{background:#f5f5f5;color:#111;border-color:#f5f5f5}
.card{background:rgba(24,24,27,.94);border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 14px 32px rgba(0,0,0,.28)} h2{font-size:16px;margin:0 0 12px}
label{display:block;font-size:12px;color:var(--muted);margin:12px 0 6px} input,select,textarea{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:13px 12px;font-size:16px;outline:none} textarea{min-height:88px;resize:vertical}
.row,.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px} button{width:100%;border:0;border-radius:15px;padding:14px 12px;font-size:15px;font-weight:800;background:#f5f5f5;color:#111;margin-top:10px} button.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line)} button.danger{background:#2b1518;color:#ffb6b6;border:1px solid #5a2a30}.mini{padding:8px 10px;font-size:12px;border-radius:11px;margin:0}
.metric{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px}.metric .name{font-size:12px;color:var(--muted)}.metric .val{font-size:20px;font-weight:900;margin-top:5px}.safe .val{color:var(--green)}.warn .val{color:var(--yellow)}.danger .val{color:var(--red)}
.out{background:#09090a;border:1px dashed #5b5b63;border-radius:15px;padding:12px;white-space:pre-wrap;line-height:1.6;min-height:80px;font-size:14px}.list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto}.item{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px}.item b{font-size:14px}.item span{font-size:12px;color:var(--muted)}
.hidden{display:none}.small{font-size:12px;color:var(--muted);line-height:1.65}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#f5f5f5;color:#111;padding:11px 15px;border-radius:999px;font-weight:900;font-size:13px;opacity:0;transition:.2s;z-index:99}.toast.show{opacity:1;bottom:34px}.progress{height:10px;background:#2b2b31;border-radius:999px;overflow:hidden;margin-top:9px}.bar{height:100%;background:#f5f5f5;width:0%}
</style>
</head>
<body>
<header><div><h1>☕ iwato家計簿</h1><div class="sub">入力は最小限、分析はChatGPT</div></div><div class="badge" id="monthBadge">2026/7</div></header>
<nav class="tabs"><button class="tab active" data-view="input">入力</button><button class="tab" data-view="dash">残高</button><button class="tab" data-view="cash">資金</button><button class="tab" data-view="report">出力</button></nav>

<main id="view-input">
<section class="card"><h2>＋ 支出入力</h2><div class="row"><div><label>費目</label><select id="cat"></select></div><div><label>支払元</label><select id="method"></select></div></div><label>金額</label><input id="amount" type="number" inputmode="numeric" placeholder="例：8570"><label>メモ</label><input id="memo" placeholder="例：Aillioファン"><button id="add">追加して残高反映</button></section>
<section class="card"><h2>↩ 回収・補正</h2><div class="row"><button class="secondary" id="recovery">代理回収</button><button class="secondary" id="balanceFix">残高補正</button></div><div class="row"><button class="secondary" id="transfer">家計内移動</button><button class="secondary" id="waive">代理免除</button></div></section>
<section class="card"><h2>ChatGPTへ貼る文</h2><div class="out" id="copyBox">まだ入力がありません。</div><button id="copy">コピー</button><button class="secondary" id="clearDraft">貼り付け文だけクリア</button></section>
</main>

<main id="view-dash" class="hidden"><section class="card"><h2>💰 残高</h2><div class="grid" id="balances"></div></section><section class="card"><h2>📊 今月概算</h2><div class="grid" id="monthly"></div><p class="small">この端末に入力した分のみの概算。正式な締めはChatGPTとCSV照合を正にします。</p></section><section class="card"><h2>🧾 最近の入力</h2><div class="list" id="recent"></div></section></main>

<main id="view-cash" class="hidden"><section class="card"><h2>📉 キャッシュフロー目安</h2><div class="grid" id="cashGrid"></div><p class="small">初期値は会話内の見込み。カード利用を追加すると、現在月の固定費以外に加算します。</p></section><section class="card"><h2>安全ライン</h2><div class="metric" id="safetyMetric"><div class="name">次の細い地点</div><div class="val">計算中</div></div><p class="small">5万円未満は赤、5〜10万円は黄、10万円以上は緑。</p></section></main>

<main id="view-report" class="hidden"><section class="card"><h2>📄 月次メモ生成</h2><div class="out" id="reportBox"></div><button id="copyReport">月次メモをコピー</button></section><section class="card"><h2>⚙️ 設定・バックアップ</h2><div class="row"><div><label>年</label><input id="year" type="number" inputmode="numeric"></div><div><label>月</label><input id="month" type="number" inputmode="numeric"></div></div><button id="saveYM">年月保存</button><label>データバックアップ</label><textarea id="backup"></textarea><button id="copyBackup">バックアップコピー</button><button class="danger" id="reset">全データ初期化</button></section></main>
<div class="toast" id="toast">コピーしました</div>

<script>
const INIT={year:2026,month:7,balances:{"口座":191612,"財布":4337,"PayPay残高":37397,"ICOCA":1380,"J-Coin":1,"未回収代理":0},cats:["食費・カフェ","住居・日用品","キッチン用品","コーヒー・焙煎設備","医薬品","健康・サプリ","通信費","娯楽","服飾","代理","その他"],methods:["財布","PayPay残高","口座","楽天カード","Amazonカード","PayPayカード","ICOCA","J-Coin","楽天ポイント"],entries:[],draft:[],cash:{"7月":{start:191612,night:107685,fixed:107570,other:151484,day:42600},"8月":{start:82743,night:107685,fixed:90570,other:53840,day:80000},"9月":{start:136018,night:107685,fixed:44933,other:8142,day:80000}}};
let st=load();function load(){try{return JSON.parse(localStorage.getItem("iwato-kakeibo-v01"))||structuredClone(INIT)}catch(e){return structuredClone(INIT)}}function save(){localStorage.setItem("iwato-kakeibo-v01",JSON.stringify(st))}function yen(n){return Number(n||0).toLocaleString("ja-JP")+"円"}function toast(s="コピーしました"){let t=document.getElementById("toast");t.textContent=s;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1300)}async function cp(s){try{await navigator.clipboard.writeText(s);toast()}catch(e){toast("コピーできない場合は長押しで選択")}}function today(){let d=new Date();return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`}function sel(id,arr){document.getElementById(id).innerHTML=arr.map(x=>`<option>${x}</option>`).join("")}function moneyMethods(){return["財布","PayPay残高","口座","ICOCA","J-Coin","楽天ポイント"]}function addBal(k,a){if(st.balances[k]!==undefined)st.balances[k]+=Number(a)}function subBal(k,a){if(st.balances[k]!==undefined)st.balances[k]-=Number(a)}function currentMonthName(){return st.month+"月"}function addOtherIfCard(method,amount){if(["楽天カード","Amazonカード","PayPayカード"].includes(method)){let m=currentMonthName();if(st.cash[m])st.cash[m].other+=Number(amount||0)}}function entry(o){o.id=String(Date.now()+Math.random());o.date=today();st.entries.push(o)}
function render(){document.getElementById("monthBadge").textContent=`${st.year}/${st.month}`;sel("cat",st.cats);sel("method",st.methods);document.getElementById("copyBox").textContent=st.draft.length?["【支出】",...st.draft].join("\n"):"まだ入力がありません。";document.getElementById("balances").innerHTML=Object.entries(st.balances).map(([k,v])=>`<div class="metric"><div class="name">${k}</div><div class="val">${yen(v)}</div></div>`).join("");const sums={};let total=0,card=0;for(const e of st.entries){if(e.type!=="支出")continue;if(e.cat!=="代理"){sums[e.cat]=(sums[e.cat]||0)+e.amount;total+=e.amount}if(["楽天カード","Amazonカード","PayPayカード"].includes(e.method))card+=e.amount}const food=sums["食費・カフェ"]||0;const foodPct=Math.min(100,Math.round(food/30000*100));document.getElementById("monthly").innerHTML=`<div class="metric"><div class="name">食費・カフェ</div><div class="val">${yen(food)}</div><div class="progress"><div class="bar" style="width:${foodPct}%"></div></div></div><div class="metric"><div class="name">カード利用追加</div><div class="val">${yen(card)}</div></div><div class="metric"><div class="name">支出合計</div><div class="val">${yen(total)}</div></div><div class="metric"><div class="name">入力件数</div><div class="val">${st.entries.length}件</div></div>`;document.getElementById("recent").innerHTML=st.entries.length?[...st.entries].slice(-20).reverse().map(e=>`<div class="item"><div><b>${e.label}</b><br><span>${e.date}</span></div><button class="mini secondary" onclick="del('${e.id}')">削除</button></div>`).join(""):`<p class="small">まだ履歴がありません。</p>`;renderCash();renderReport();document.getElementById("year").value=st.year;document.getElementById("month").value=st.month;document.getElementById("backup").value=JSON.stringify(st,null,2);save()}
function renderCash(){let html="",min=Infinity,minLabel="",prevEnd=null;for(const [m,c] of Object.entries(st.cash)){const start=prevEnd??c.start;const afterNight=start+c.night;const pay=c.fixed+c.other;const afterPay=afterNight-pay;const afterDay=afterPay+c.day;prevEnd=afterDay;if(afterPay<min){min=afterPay;minLabel=m+" 支払い後"}html+=`<div class="metric ${afterPay<50000?'danger':afterPay<100000?'warn':'safe'}"><div class="name">${m} 支払い後</div><div class="val">${yen(afterPay)}</div></div><div class="metric ${afterDay<50000?'danger':afterDay<100000?'warn':'safe'}"><div class="name">${m} 給与後</div><div class="val">${yen(afterDay)}</div></div>`}document.getElementById("cashGrid").innerHTML=html;const sm=document.getElementById("safetyMetric");sm.className="metric "+(min<50000?"danger":min<100000?"warn":"safe");sm.innerHTML=`<div class="name">${minLabel}</div><div class="val">${yen(min)}</div>`}
function renderReport(){const sums={};let total=0;for(const e of st.entries){if(e.type==="支出"&&e.cat!=="代理"){sums[e.cat]=(sums[e.cat]||0)+e.amount;total+=e.amount}}const bal=Object.entries(st.balances).map(([k,v])=>`| ${k} | ${yen(v)} |`).join("\n");const rows=st.cats.filter(c=>c!=="代理").map(c=>`| ${c} | ${yen(sums[c]||0)} |`).join("\n");document.getElementById("reportBox").textContent=`# 家計簿 ${st.year}年${st.month}月 メモ\n\n## 現在残高\n\n| 種別 | 金額 |\n|---|---:|\n${bal}\n\n## 費目別支出（端末入力分）\n\n| 費目 | 金額 |\n|---|---:|\n${rows}\n| 合計 | ${yen(total)} |\n\n※正式な月次締めはChatGPT記録とCSV照合を優先。`}
window.del=function(id){st.entries=st.entries.filter(e=>e.id!==id);toast("削除しました。残高は必要なら補正してください");render()}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");["input","dash","cash","report"].forEach(v=>document.getElementById("view-"+v).classList.add("hidden"));document.getElementById("view-"+b.dataset.view).classList.remove("hidden");render()});
document.getElementById("add").onclick=()=>{const cat=document.getElementById("cat").value,method=document.getElementById("method").value,amount=Number(document.getElementById("amount").value),memo=document.getElementById("memo").value.trim();if(!amount){toast("金額を入力");return}const label=`${cat} ${amount} ${method}${memo?" "+memo:""}`;st.draft.push(label);entry({type:"支出",cat,method,amount,memo,label});if(moneyMethods().includes(method))subBal(method,amount);if(cat==="代理")addBal("未回収代理",amount);addOtherIfCard(method,amount);document.getElementById("amount").value="";document.getElementById("memo").value="";render()}
document.getElementById("recovery").onclick=()=>{const a=Number(prompt("回収額",""));if(!a)return;const m=prompt("入金先","財布")||"財布";const label=`代理 ${a} 回収 ${m}`;st.draft.push(label);entry({type:"回収",amount:a,method:m,label});addBal(m,a);st.balances["未回収代理"]=Math.max(0,st.balances["未回収代理"]-a);render()}
document.getElementById("balanceFix").onclick=()=>{const m=prompt("補正項目","PayPay残高")||"PayPay残高";const a=Number(prompt("実残高",""));if(a!==0&&!a)return;const label=`【残高】\n${m} ${a}`;st.draft.push(label);entry({type:"残高補正",amount:a,method:m,label});if(st.balances[m]!==undefined)st.balances[m]=a;render()}
document.getElementById("transfer").onclick=()=>{const a=Number(prompt("移動額",""));if(!a)return;const to=prompt("増える項目","PayPay残高")||"PayPay残高";const label=`家計内移動 ${a} ${to}`;st.draft.push(label);entry({type:"家計内移動",amount:a,method:to,label});addBal(to,a);render()}
document.getElementById("waive").onclick=()=>{const a=Number(prompt("免除額",""));if(!a)return;const label=`代理 ${a} 免除`;st.draft.push(label);entry({type:"代理免除",amount:a,label});st.balances["未回収代理"]=Math.max(0,st.balances["未回収代理"]-a);render()}
document.getElementById("copy").onclick=()=>cp(document.getElementById("copyBox").textContent);document.getElementById("clearDraft").onclick=()=>{st.draft=[];render()};document.getElementById("copyReport").onclick=()=>cp(document.getElementById("reportBox").textContent);document.getElementById("saveYM").onclick=()=>{st.year=Number(document.getElementById("year").value)||st.year;st.month=Number(document.getElementById("month").value)||st.month;render()};document.getElementById("copyBackup").onclick=()=>cp(document.getElementById("backup").value);document.getElementById("reset").onclick=()=>{if(confirm("全データを初期化しますか？")){localStorage.removeItem("iwato-kakeibo-v01");st=structuredClone(INIT);render()}};
if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}render();
</script>
</body>
</html>
