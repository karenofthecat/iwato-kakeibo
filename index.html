der:1px solid var(--line)}button.danger{background:#2b1518;color:#ffb6b6;border:1px solid #5a2a30}.mini{padding:8px 10px;font-size:12px;border-radius:11px;margin:0}.metric{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px}.metric .name{font-size:12px;color:var(--muted)}.metric .val{font-size:20px;font-weight:950;margin-top:5px}.safe .val{color:var(--green)}.warn .val{color:var(--yellow)}.danger .val{color:var(--red)}.out{background:#09090a;border:1px dashed #5b5b63;border-radius:15px;padding:12px;white-space:pre-wrap;line-height:1.6;min-height:80px;font-size:14px}.list{display:flex;flex-direction:column;gap:8px;max-height:430px;overflow:auto}.item{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px}.item b{font-size:14px}.item span{font-size:12px;color:var(--muted)}.hidden{display:none}.small{font-size:12px;color:var(--muted);line-height:1.65}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#f5f5f5;color:#111;padding:11px 15px;border-radius:999px;font-weight:900;font-size:13px;opacity:0;transition:.2s;z-index:99}.toast.show{opacity:1;bottom:34px}.progress{height:10px;background:#2b2b31;border-radius:999px;overflow:hidden;margin-top:9px}.bar{height:100%;background:#f5f5f5;width:0%}.rank{display:flex;align-items:center;gap:10px}.rank .label{width:42%;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank .barwrap{flex:1;background:#2b2b31;border-radius:999px;height:10px;overflow:hidden}.rank .amt{width:82px;text-align:right;font-size:13px;font-weight:900}.divider{height:1px;background:var(--line);margin:10px 0}.mono{font-variant-numeric:tabular-nums}
</style></head><body><header><div class="brand"><img class="appicon" src="./icon.png"><div><h1>iwato家計簿</h1><div class="sub">入力は最小限、分析はChatGPT</div></div></div><div class="badge" id="monthBadge">2026/7</div></header><nav class="tabs"><button class="tab active" data-view="home">ホーム</button><button class="tab" data-view="input">入力</button><button class="tab" data-view="card">カード</button><button class="tab" data-view="cash">資金</button><button class="tab" data-view="analysis">分析</button><button class="tab" data-view="report">出力</button></nav>
<main id="view-home"><section class="card"><h2>🏠 ホーム</h2><div class="grid" id="homeMetrics"></div></section><section class="card"><h2>安全ライン</h2><div class="metric" id="homeSafety"><div class="name">計算中</div><div class="val">--</div></div></section></main>

<main id="view-cash" class="hidden"><section class="card"><h2>📉 キャッシュフロー</h2><div class="list" id="cashList"></div></section><section class="card"><h2>安全ライン</h2><div class="metric" id="safetyMetric"><div class="name">次の細い地点</div><div class="val">計算中</div></div><p class="small">5万円未満は赤、5〜10万円は黄、10万円以上は緑。</p></section></main>
<main id="view-analysis" class="hidden"><section class="card"><h2>費目別グラフ</h2><div class="list" id="catGraph"></div></section><section class="card"><h2>金額ランキング</h2><div class="list" id="amountRank"></div></section></main>

<script>
const APP_VERSION='0.4';

const Store={load(){try{let raw=localStorage.getItem('iwato-kakeibo-v01');return raw?this.migrate(JSON.parse(raw)):structuredClone(DEFAULT_DATA)}catch(e){return structuredClone(DEFAULT_DATA)}},save(d){localStorage.setItem('iwato-kakeibo-v01',JSON.stringify(d))},migrate(d){let n=structuredClone(DEFAULT_DATA);d.version=APP_VERSION;d.categories=n.categories;d.methods=n.methods;d.cashPlan=n.cashPlan;d.cardViewMonth=d.cardViewMonth||d.month||7;d.balances=d.balances||n.balances;d.entries=d.entries||[];d.draft=d.draft||[];d.installments=(d.installments||n.installments).map(x=>({id:x.id||x.name||String(Date.now()+Math.random()),name:x.name,card:x.card,category:x.category||x.cat||'その他',amount:Number(x.amount||0),startBillMonth:Number(x.startBillMonth||x.startMonth||x.start||7),endBillMonth:Number(x.endBillMonth||x.endMonth||x.end||7)}));d.entries=d.entries.map(e=>{if(e.type==='expense'&&!e.billMonth&&['楽天カード','Amazonカード','PayPayカード'].includes(e.method))e.billMonth=d.month;return e});return d}};
let data=Store.load();
const Calc={cardMethods:['楽天カード','Amazonカード','PayPayカード'],moneyMethods:['財布','PayPay残高','口座','ICOCA','J-Coin','楽天ポイント'],yen:n=>Number(n||0).toLocaleString('ja-JP')+'円',mName:m=>m+'月',mNum:m=>Number(String(m).replace('月','')),isCard:m=>['楽天カード','Amazonカード','PayPayカード'].includes(m),entriesForBillMonth(m,card=null){return data.entries.filter(e=>e.type==='expense'&&this.isCard(e.method)&&Number(e.billMonth||data.month)===Number(m)&&(!card||e.method===card))},installmentsForMonth(m,card=null){return data.installments.filter(x=>Number(m)>=x.startBillMonth&&Number(m)<=x.endBillMonth&&(!card||x.card===card))},cardTotal(m,card){return this.entriesForBillMonth(m,card).reduce((a,e)=>a+Number(e.amount||0),0)+this.installmentsForMonth(m,card).reduce((a,e)=>a+Number(e.amount||0),0)},otherTotal(m){let plan=data.cashPlan[this.mName(m)]||{baseOther:0};return Number(plan.baseOther||0)+this.cardMethods.reduce((a,c)=>a+this.cardTotal(m,c),0)},categorySums(){let sums={};for(let e of data.entries){if(e.type==='expense'&&e.category!=='代理'){sums[e.category]=(sums[e.category]||0)+Number(e.amount||0)}}for(let x of this.installmentsForMonth(data.month)){sums[x.category]=(sums[x.category]||0)+Number(x.amount||0)}return sums},ranking(){let rows=[];for(let e of data.entries){if(e.type==='expense'&&e.category!=='代理')rows.push({label:e.memo||e.category,amount:e.amount,sub:e.method})}for(let x of this.installmentsForMonth(data.month)){rows.push({label:x.name,amount:x.amount,sub:x.card+' 分割'})}return rows.sort((a,b)=>b.amount-a.amount)},cashFlow(){let rows=[],prevEnd=null;for(let mn of Object.keys(data.cashPlan)){let p=data.cashPlan[mn],m=this.mNum(mn),start=prevEnd??Number(p.start||0),afterNight=start+Number(p.nightIncome||0),other=this.otherTotal(m),totalPay=Number(p.fixed||0)+other,afterPay=afterNight-totalPay,afterDay=afterPay+Number(p.dayIncome||0);rows.push({month:mn,start,afterNight,fixed:p.fixed,other,totalPay,afterPay,afterDay});prevEnd=afterDay}return rows},safety(){let rows=this.cashFlow(),min=rows[0];for(let r of rows){if(r.afterPay<min.afterPay)min=r}return{label:min.month+' 支払い後',amount:min.afterPay}}};
const UI={q:id=>document.getElementById(id),toast(s='コピーしました'){let t=this.q('toast');t.textContent=s;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1300)},async copy(s){try{await navigator.clipboard.writeText(s);this.toast()}catch(e){this.toast('長押しでコピーしてください')}},sel(id,arr){this.q(id).innerHTML=arr.map(x=>`<option>${x}</option>`).join('')},cls(v){return v<50000?'danger':v<100000?'warn':'safe'},render(){this.q('monthBadge').textContent=`${data.year}/${data.month}`;this.sel('cat',data.categories);this.sel('method',data.methods);this.sel('incomeTo',data.methods.filter(m=>Calc.moneyMethods.includes(m)));this.sel('installCard',Calc.cardMethods);this.sel('installCat',data.categories.filter(c=>c!=='代理'));this.renderHome();this.renderInput();this.renderCards();this.renderCash();this.renderAnalysis();this.renderReport();Store.save(data)},renderHome(){let sums=Calc.categorySums(),food=sums['食費・カフェ']||0,ct=Calc.cardMethods.reduce((a,c)=>a+Calc.cardTotal(data.month,c),0),s=Calc.safety();this.q('homeMetrics').innerHTML=`<div class="metric"><div class="name">財布</div><div class="val">${Calc.yen(data.balances['財布'])}</div></div><div class="metric"><div class="name">PayPay残高</div><div class="val">${Calc.yen(data.balances['PayPay残高'])}</div></div><div class="metric"><div class="name">口座</div><div class="val">${Calc.yen(data.balances['口座'])}</div></div><div class="metric"><div class="name">${data.month}月カード請求</div><div class="val">${Calc.yen(ct)}</div></div><div class="metric"><div class="name">食費・カフェ</div><div class="val">${Calc.yen(food)}</div><div class="progress"><div class="bar" style="width:${Math.min(100,Math.round(food/30000*100))}%"></div></div></div><div class="metric"><div class="name">未回収代理</div><div class="val">${Calc.yen(data.balances['未回収代理'])}</div></div>`;let el=this.q('homeSafety');el.className='metric '+this.cls(s.amount);el.innerHTML=`<div class="name">${s.label}</div><div class="val">${Calc.yen(s.amount)}</div>`},renderInput(){this.q('copyBox').textContent=data.draft.length?['【支出】',...data.draft].join('\n'):'まだ入力がありません。';this.q('recent').innerHTML=data.entries.length?[...data.entries].slice(-20).reverse().map(e=>`<div class="item"><div><b>${e.label}</b><br><span>${e.date}</span></div><button class="mini secondary" onclick="Actions.deleteEntry('${e.id}')">削除</button></div>`).join(''):'<p class="small">まだ履歴がありません。</p>'},renderCards(){this.q('cardViewMonth').value=data.cardViewMonth;this.q('cardTotals').innerHTML=Calc.cardMethods.map(c=>`<div class="metric"><div class="name">${c}</div><div class="val">${Calc.yen(Calc.cardTotal(data.cardViewMonth,c))}</div></div>`).join('');let html='';for(let c of Calc.cardMethods){html+=`<div class="metric"><div class="name">${c}</div><div class="val">${Calc.yen(Calc.cardTotal(data.cardViewMonth,c))}</div></div><div class="list">`;for(let e of Calc.entriesForBillMonth(data.cardViewMonth,c))html+=`<div class="item"><div><b>${e.memo||e.category} ${Calc.yen(e.amount)}</b><br><span>${e.category} / 購入 ${e.date} / 請求 ${e.billMonth}月</span></div></div>`;for(let x of Calc.installmentsForMonth(data.cardViewMonth,c))html+=`<div class="item"><div><b>${x.name} ${Calc.yen(x.amount)}</b><br><span>${x.category} / 分割 ${x.startBillMonth}月〜${x.endBillMonth}月</span></div><button class="mini secondary" onclick="Actions.deleteInstallment('${x.id}')">削除</button></div>`;html+='</div><div class="divider"></div>'}this.q('cardDetails').innerHTML=html;this.q('installList').innerHTML=data.installments.length?data.installments.map(x=>`<div class="item"><div><b>${x.name} ${Calc.yen(x.amount)}</b><br><span>${x.card} / ${x.category} / ${x.startBillMonth}月〜${x.endBillMonth}月</span></div><button class="mini secondary" onclick="Actions.deleteInstallment('${x.id}')">削除</button></div>`).join(''):'<p class="small">登録なし</p>'},renderCash(){this.q('cashList').innerHTML=Calc.cashFlow().map(r=>`<div class="item"><div><b>${r.month}</b><br><span class="mono">月初 ${Calc.yen(r.start)} / 夜職後 ${Calc.yen(r.afterNight)}<br>固 const Actions={today(){let d=new Date();return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`},addEntry(e){e.id=String(Date.now()+Math.random());e.date=this.today();data.entries.push(e)},addExpense(){let category=UI.q('cat').value,method=UI.q('method').value,amount=Number(UI.q('amount').value),memo=UI.q('memo').value.trim(),affect=UI.q('affectBalance').value==='yes',billMonth=Number(UI.q('billMonth').value||data.month);if(!amount){UI.toast('金額を入力');return}let label=`${category} ${amount} ${method}${memo?' '+memo:''}${Calc.isCard(method)?' 請求'+billMonth+'月':''}${!affect?' 過去分':''}`;data.draft.push(label);this.addEntry({type:'expense',category,method,amount,memo,label,billMonth,affectBalance:affect});if(affect&&Calc.moneyMethods.includes(method))data.balances[method]-=amount;if(category==='代理')data.balances['未回収代理']+=amount;UI.q('amount').value='';UI.q('memo').value='';UI.q('billMonth').value='';UI.render()},addIncome(){let method=UI.q('incomeTo').value,amount=Number(UI.q('incomeAmount').value),memo=UI.q('incomeMemo').value.trim();if(!amount){UI.toast('金額を入力');return}let label=`入金 ${amount} ${method}${memo?' '+memo:''}`;data.draft.push(label);this.addEntry({type:'income',method,amount,memo,label});if(data.balances[method]!==undefined)data.balances[method]+=amount;UI.q('incomeAmount').value='';UI.q('incomeMemo').value='';UI.render()},recovery(){let amount=Number(prompt('回収額',''));if(!amount)return;let method=prompt('入金先','財布')||'財布';let label=`代理 ${amount} 回収 ${method}`;data.draft.push(label);this.addEntry({type:'recovery',amount,method,label});if(data.balances[method]!==undefined)data.balances[method]+=amount;data.balances['未回収代理']=Math.max(0,data.balances['未回収代理']-amount);UI.render()},balanceFix(){let method=prompt('補正項目','PayPay残高')||'PayPay残高',amount=Number(prompt('実残高',''));if(amount!==0&&!amount)return;let label=`【残高】\n${method} ${amount}`;data.draft.push(label);this.addEntry({type:'balance',amount,method,label});if(data.balances[method]!==undefined)data.balances[method]=amount;UI.render()},waive(){let amount=Number(prompt('免除額',''));if(!amount)return;let label=`代理 ${amount} 免除`;data.draft.push(label);this.addEntry({type:'waive',amount,label});data.balances['未回収代理']=Math.max(0,data.balances['未回収代理']-amount);UI.render()},pastMode(){UI.q('affectBalance').value='no';UI.toast('残高反映なしにしました')},addInstallment(){let name=UI.q('installName').value.trim(),card=UI.q('installCard').value,category=UI.q('installCat').value,amount=Number(UI.q('installAmount').value),startBillMonth=Number(UI.q('installStart').value),endBillMonth=Number(UI.q('installEnd').value);if(!name||!amount||!startBillMonth||!endBillMonth){UI.toast('分割情報を入力');return}data.installments.push({id:String(Date.now()+Math.random()),name,card,category,amount,startBillMonth,endBillMonth});data.draft.push(`分割登録 ${name} ${amount} ${card} ${startBillMonth}月〜${endBillMonth}月`);['installName','installAmount','installStart','installEnd'].forEach(id=>UI.q(id).value='');UI.render()},deleteEntry(id){data.entries=data.entries.filter(e=>e.id!==id);UI.toast('削除しました。残高は必要なら補正してください');UI.render()},deleteInstallment(id){data.installments=data.installments.filter(x=>x.id!==id);UI.toast('分割を削除しました');UI.render()}};
